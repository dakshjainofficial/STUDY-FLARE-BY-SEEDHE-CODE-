<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room | StudyFlare</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body id="roomBody">
    <header class="nav-header">
        <div class="logo" style="font-weight: 800; font-size: 1.4rem;">STUDY<span style="color: var(--primary)">FLARE</span></div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span class="flare-tag tag-live">Active Focus Room</span>
            <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.8rem;" onclick="location.href='dashboard.html'">Exit Session</button>
        </div>
    </header>

    <div class="dash-layout" style="height: calc(100vh - 80px);">
        <!-- Focus Area -->
        <main class="animate-on-load" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div class="flare-card" style="width: 100%; max-width: 600px; text-align: center; padding: 4rem;">
                <p style="text-transform: uppercase; letter-spacing: 2px; font-weight: 800; color: var(--text-sub);">Focus Cycle</p>
                <h1 id="timerValue" style="font-size: 8rem; color: var(--primary); margin: 1rem 0;">25:00</h1>
                <button id="timerBtn" class="btn btn-primary" style="margin: 0 auto; padding: 1rem 4rem;" onclick="startTimer(this)">Start Studying</button>
            </div>
        </main>

        <!-- Chat Area -->
        <aside class="dash-sidebar animate-on-load" style="animation-delay: 0.2s;">
            <div class="flare-card" style="height: 100%; display: flex; flex-direction: column; padding: 0;">
                <div style="padding: 1.5rem; border-bottom: 1px solid var(--border); font-weight: 800;">
                    Session Chat
                </div>
                
                <div id="chatMessages" style="flex-grow: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column;">
                    <div class="message msg-others" style="margin-bottom: 15px;">System: Joined Focus Session.</div>
                </div>

                <div style="padding: 1.2rem; background: #0a0a0a; border-top: 1px solid var(--border); display: flex; gap: 10px;">
                    <input type="text" id="chatInput" class="flare-input" placeholder="Say something...">
                    <button id="sendChatBtn" class="btn btn-primary" style="padding: 0 20px;">🚀</button>
                </div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
